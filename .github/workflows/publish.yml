name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        working-directory: packages/react-native-seatmap
        run: npm run build

      - name: Run tests
        working-directory: packages/react-native-seatmap
        run: npm test

      - name: Publish to npm
        working-directory: packages/react-native-seatmap
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
