name: Security Scan

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (root workspace)
        run: npm audit --audit-level=high

      - name: npm audit (package)
        working-directory: packages/react-native-seatmap
        run: npm audit --audit-level=high || true

      - name: Type check
        working-directory: packages/react-native-seatmap
        run: npm run typecheck

      - name: Run tests
        working-directory: packages/react-native-seatmap
        run: npm test
